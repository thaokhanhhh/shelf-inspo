<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>internet moments x micro apps</title>
<style>
  :root {
    color-scheme: light;
    /* Shelf brand palette */
    --ink: #0F0F0F;
    --paper: #FAF6EE;         /* warm cream page bg */
    --card: #FFFFFF;
    --muted: #8B8B85;         /* warm gray */
    --line: #EFE9DA;          /* warm border */
    --line-soft: #F6F1E4;

    /* Pastels — main tones */
    --pink-soft: #FCE3EF;
    --peri-soft: #DCE1FA;
    --lime-soft: #ECF7C6;
    --peach-soft: #FBE0D2;
    --yellow-soft: #FBF1CC;

    /* Vivid — highlights */
    --pink: #F26FBB;
    --peri: #8B99F0;
    --lime: #C2F14E;
    --coral: #EE4A2A;
    --yellow: #F1C22E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 16px 0 80px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(15, 15, 15, 0.05);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .header .count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  /* Shelf wordmark logo in header top-right */
  .header-logo {
    height: 22px;
    width: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Micro-app filter tabs — sticky below header. Each app has a signature pastel + vivid. */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 49px;
    z-index: 9;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 16px;
    background: var(--line-soft);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.15s, color 0.15s, transform 0.05s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab:hover { background: var(--line); }
  .tab:active { transform: scale(0.97); }
  .tab .tab-count {
    opacity: 0.55;
    margin-left: 4px;
    font-weight: 500;
  }
  .tab.active .tab-count { opacity: 0.8; }

  /* Signature colors per micro-app */
  .tab[data-key="Celeb Soulmate"] { background: var(--pink-soft); color: #A63587; }
  .tab[data-key="Celeb Soulmate"]:hover { background: #F9CFE4; }
  .tab[data-key="Celeb Soulmate"].active { background: var(--pink); color: #fff; }
  .tab[data-key="Celeb Soulmate"].active:hover { background: #EE5EB0; }

  .tab[data-key="Heartstopper Match"] { background: var(--peri-soft); color: #4557C4; }
  .tab[data-key="Heartstopper Match"]:hover { background: #CBD3F7; }
  .tab[data-key="Heartstopper Match"].active { background: var(--peri); color: #fff; }
  .tab[data-key="Heartstopper Match"].active:hover { background: #7987EC; }

  .tab[data-key="iPod Top Song"] { background: var(--lime-soft); color: #5D7A0E; }
  .tab[data-key="iPod Top Song"]:hover { background: #E1F3B0; }
  .tab[data-key="iPod Top Song"].active { background: var(--lime); color: var(--ink); }
  .tab[data-key="iPod Top Song"].active:hover { background: #B4EA35; }

  .tab[data-key="all"].active { background: var(--ink); color: #fff; }
  .tab[data-key="all"].active:hover { background: #000; }

  .feed { padding: 0; }

  /* Trend cards — shown when All tab is active and no trend drilled in */
  .trend-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background 0.15s;
  }
  .trend-card:hover { background: #FEF9F3; }
  .trend-body { flex: 1; min-width: 0; }
  .trend-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.15px;
    margin-bottom: 4px;
  }
  .trend-meta {
    font-size: 13px;
    color: var(--muted);
  }
  .trend-apps {
    display: flex;
    gap: 5px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .trend-app-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .trend-app-chip[data-app="Celeb Soulmate"] { background: var(--pink-soft); color: #A63587; }
  .trend-app-chip[data-app="Heartstopper Match"] { background: var(--peri-soft); color: #4557C4; }
  .trend-app-chip[data-app="iPod Top Song"] { background: var(--lime-soft); color: #5D7A0E; }
  .trend-app-chip[data-app="Other"] { background: var(--line-soft); color: var(--muted); }

  .trend-chevron {
    color: #D5CFC0;
    font-size: 22px;
    line-height: 1;
    padding-top: 2px;
    flex-shrink: 0;
  }

  /* Back to trends button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
    border-bottom: 1px solid var(--line-soft);
    transition: color 0.15s, background 0.15s;
  }
  .back-btn:hover { background: #FEF9F3; color: var(--ink); }
  .back-btn svg { width: 16px; height: 16px; stroke-width: 2; }
  .back-btn .trend-context { color: var(--ink); font-weight: 700; margin-left: 6px; }

  .post {
    display: flex;
    gap: 12px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--line-soft);
    position: relative;
  }
  .thread-line {
    position: absolute;
    left: 37px;
    top: 60px;
    bottom: 12px;
    width: 2px;
    background: var(--line);
    border-radius: 1px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--peach-soft), var(--pink));
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    z-index: 1;
    box-shadow: 0 1px 3px rgba(242, 111, 187, 0.25);
  }
  .post-body { flex: 1; min-width: 0; }

  .post-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .post-header .handle {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .post-header .time {
    color: var(--muted);
    font-size: 14px;
    margin-left: 6px;
  }
  .post-header .counter {
    margin-left: auto;
    font-size: 12px;
    color: #4557C4;
    background: var(--peri-soft);
    border-radius: 12px;
    padding: 3px 10px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
  }
  .post-header .more {
    color: #C4BEB0;
    font-size: 20px;
    padding: 0 4px 0 8px;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .post-header .counter + .more { margin-left: 4px; }
  .post-header .more.only { margin-left: auto; }

  .caption {
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .source-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px 3px 8px;
    background: var(--peach-soft);
    border-radius: 12px;
    font-size: 12px;
    color: #B84A1F;
    text-decoration: none;
    font-weight: 700;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    margin-left: 2px;
  }
  .source-chip:hover { background: #F9CFB3; color: #8F3812; }
  .source-chip svg { width: 11px; height: 11px; stroke-width: 2.4; color: #B84A1F; flex-shrink: 0; }
  .source-chip:hover svg { color: #8F3812; }

  /* Threads-native carousel: fixed height, natural aspect widths, next slide peeks */
  .carousel {
    position: relative;
    margin: 0 -20px 10px;
    overflow: hidden;
  }
  .carousel-track {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    scroll-snap-type: x mandatory;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-slide {
    flex: 0 0 auto;
    scroll-snap-align: start;
    height: 380px;
    max-width: calc(100% - 60px);
    border-radius: 14px;
    overflow: hidden;
    background: var(--line-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-slide img,
  .carousel-slide video {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .carousel-single .carousel-slide {
    max-width: 100%;
  }

  /* Placeholder slide — dashed card describing image that goes here */
  .carousel-slide.placeholder {
    background: #FEF9F3;
    border: 2px dashed var(--pink);
    padding: 24px 20px;
    width: 260px;
    flex-direction: column;
    text-align: center;
    color: var(--muted);
  }
  .carousel-slide.placeholder .ph-icon {
    font-size: 34px;
    opacity: 0.75;
    margin-bottom: 14px;
    line-height: 1;
  }
  .carousel-slide.placeholder .ph-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--pink);
    margin-bottom: 10px;
  }
  .carousel-slide.placeholder .ph-body {
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink);
    max-width: 220px;
  }

  .actions {
    display: flex;
    gap: 2px;
    margin-top: 6px;
    color: var(--muted);
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .action:hover { background: var(--pink-soft); color: var(--pink); }
  .action:hover:nth-child(2) { background: var(--peri-soft); color: var(--peri); }
  .action:hover:nth-child(3) { background: var(--lime-soft); color: #5D7A0E; }
  .action:hover:nth-child(4) { background: var(--peach-soft); color: var(--coral); }
  .action svg { width: 20px; height: 20px; stroke-width: 1.6; }

  .empty {
    padding: 80px 24px;
    text-align: center;
    color: var(--muted);
  }
  .empty .emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.85; }
  .empty h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
  .empty p { font-size: 14px; line-height: 1.5; max-width: 340px; margin: 0 auto; }
  .empty code {
    background: var(--pink-soft);
    color: var(--pink);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>

  const feed = document.getElementById('feed');
  const countEl = document.getElementById('count');
  const tabsEl = document.getElementById('tabs');
  let activeFilter = 'all';
  let activeTrend = null;  // set when drilled into a specific trend from All tab

  function iconHeart() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'; }
  function iconComment() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'; }
  function iconRepost() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>'; }
  function iconShare() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>'; }

  function initial(handle) {
    return (handle || '?').replace(/^@/, '').charAt(0).toUpperCase();
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  function renderPost(post, idx) {
    const n = post.images ? post.images.length : 0;
    const isMulti = n > 1;
    const slides = (post.images || []).map((s, i) => {
      // Placeholder slide (text card describing what image goes here)
      if (s && typeof s === 'object' && s.placeholder) {
        return `<div class="carousel-slide placeholder">
          <div class="ph-icon">🖼️</div>
          <div class="ph-label">Slide ${i + 1}</div>
          <div class="ph-body">${escapeHtml(s.placeholder)}</div>
        </div>`;
      }
      const src = typeof s === 'string' ? s : (s && s.src) || '';
      const isVideo = /^data:video\//.test(src) || /\.(mp4|webm|mov)($|\?)/i.test(src);
      const media = isVideo
        ? `<video src="${src}" autoplay loop muted playsinline></video>`
        : `<img src="${src}" alt="" />`;
      return `<div class="carousel-slide">${media}</div>`;
    }).join('');
    const counterHtml = isMulti
      ? `<span class="counter" data-total="${n}"><span class="cur">1</span>/${n}</span><span class="more">···</span>`
      : `<span class="more only">···</span>`;

    return `
      <article class="post" data-idx="${idx}">
        <div class="thread-line"></div>
        <div class="avatar">${initial(post.handle)}</div>
        <div class="post-body">
          <div class="post-header">
            <span class="handle">${escapeHtml(post.handle || 'emily')}</span>
            ${post.source ? `
              <a class="source-chip" href="${escapeHtml(post.source.url)}" target="_blank" rel="noopener noreferrer" title="Open original ${escapeHtml(post.source.platform || 'Threads')} post by ${escapeHtml(post.source.handle || '')}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${escapeHtml(post.source.handle || 'source')}
              </a>` : ''}
            <span class="time">${escapeHtml(post.time || '')}</span>
            ${counterHtml}
          </div>
          <div class="caption">${escapeHtml(post.caption)}</div>
          ${n ? `
            <div class="carousel ${isMulti ? '' : 'carousel-single'}">
              <div class="carousel-track">${slides}</div>
            </div>` : ''}
          <div class="actions">
            <span class="action">${iconHeart()}</span>
            <span class="action">${iconComment()}</span>
            <span class="action">${iconRepost()}</span>
            <span class="action">${iconShare()}</span>
          </div>
        </div>
      </article>
    `;
  }

  function renderEmpty() {
    return `
      <div class="empty">
        <div class="emoji">💡</div>
        <h2>No inspo yet</h2>
        <p>Send me an idea + slide images in chat. I'll draft the caption with your <code>shelf-viral-caption</code> skill and drop it here as a post.</p>
      </div>
    `;
  }

  function renderTabs() {
    const uniqueApps = [];
    const seen = new Set();
    posts.forEach(p => {
      const a = p.microApp || 'Other';
      if (!seen.has(a)) { seen.add(a); uniqueApps.push(a); }
    });
    const buttons = [{ key: 'all', label: 'All', count: posts.length }];
    uniqueApps.forEach(a => {
      buttons.push({ key: a, label: a, count: posts.filter(p => (p.microApp || 'Other') === a).length });
    });
    tabsEl.innerHTML = buttons.map(b =>
      `<button class="tab${activeFilter === b.key ? ' active' : ''}" data-key="${escapeHtml(b.key)}">${escapeHtml(b.label)}<span class="tab-count">${b.count}</span></button>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => {
        activeFilter = el.dataset.key;
        activeTrend = null;  // switching tabs clears any drilled-in trend
        renderTabs();
        render();
      });
    });
  }

  function renderTrendList() {
    // Group posts by trend, preserve first-seen order (matches how posts array is ordered — newest first)
    const trendMap = new Map();
    posts.forEach(p => {
      const t = p.trend || 'Uncategorized';
      if (!trendMap.has(t)) {
        trendMap.set(t, { name: t, posts: [], apps: new Set() });
      }
      const entry = trendMap.get(t);
      entry.posts.push(p);
      if (p.microApp) entry.apps.add(p.microApp);
    });

    const trends = Array.from(trendMap.values());
    return trends.map(t => `
      <div class="trend-card" data-trend="${escapeHtml(t.name)}">
        <div class="trend-body">
          <div class="trend-title">${escapeHtml(t.name)}</div>
          <div class="trend-meta">${t.posts.length} ${t.posts.length === 1 ? 'post' : 'posts'}</div>
          <div class="trend-apps">
            ${Array.from(t.apps).map(a => `<span class="trend-app-chip" data-app="${escapeHtml(a)}">${escapeHtml(a)}</span>`).join('')}
          </div>
        </div>
        <div class="trend-chevron">›</div>
      </div>
    `).join('');
  }

  function renderBackBtn() {
    return `
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All trends<span class="trend-context">/ ${escapeHtml(activeTrend)}</span>
      </button>
    `;
  }

  function wireTrendCards() {
    document.querySelectorAll('.trend-card').forEach(el => {
      el.addEventListener('click', () => {
        activeTrend = el.dataset.trend;
        render();
      });
    });
    const back = document.getElementById('back-btn');
    if (back) {
      back.addEventListener('click', () => {
        activeTrend = null;
        render();
      });
    }
  }

  function render() {
    renderTabs();

    // All tab, no trend drilled → show trend cards
    if (activeFilter === 'all' && !activeTrend) {
      if (!posts.length) {
        feed.innerHTML = renderEmpty();
        if (countEl) countEl.textContent = '0 posts';
        return;
      }
      const trendCount = new Set(posts.map(p => p.trend || 'Uncategorized')).size;
      feed.innerHTML = renderTrendList();
      if (countEl) countEl.textContent = trendCount === 1 ? '1 trend' : trendCount + ' trends';
      wireTrendCards();
      return;
    }

    // Otherwise show filtered posts (by micro-app OR by drilled trend)
    let filtered;
    if (activeFilter === 'all' && activeTrend) {
      filtered = posts.filter(p => (p.trend || 'Uncategorized') === activeTrend);
    } else {
      filtered = posts.filter(p => (p.microApp || 'Other') === activeFilter);
    }

    if (!filtered.length) {
      feed.innerHTML = renderEmpty();
      if (countEl) countEl.textContent = '0 posts';
      return;
    }

    const backHtml = activeTrend ? renderBackBtn() : '';
    feed.innerHTML = backHtml + filtered.map(renderPost).join('');
    if (countEl) countEl.textContent = filtered.length === 1 ? '1 post' : filtered.length + ' posts';
    wireCarousels();
    wireTrendCards();  // wires the back button
  }

  function wireCarousels() {
    document.querySelectorAll('.post').forEach(postEl => {
      const track = postEl.querySelector('.carousel-track');
      const cur = postEl.querySelector('.counter .cur');
      if (!track || !cur) return;
      const slides = track.querySelectorAll('.carousel-slide');
      track.addEventListener('scroll', () => {
        let bestIdx = 0;
        let bestDist = Infinity;
        const scrollLeft = track.scrollLeft;
        slides.forEach((slide, i) => {
          const dist = Math.abs(slide.offsetLeft - scrollLeft - 20);
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        });
        cur.textContent = String(bestIdx + 1);
      });
    });
  }

  render();
</script>
