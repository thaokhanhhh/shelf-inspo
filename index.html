<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>internet moments x micro apps</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f5f5f5;
    color: #000;
    display: flex;
    justify-content: center;
    padding: 16px 0 80px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 680px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .header .count {
    font-size: 13px;
    color: #999;
    font-weight: 500;
  }

  /* Micro-app filter tabs — sticky below header */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid #eee;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 49px;
    z-index: 9;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 16px;
    background: #f0f0f0;
    color: #555;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab:hover { background: #e5e5e5; color: #000; }
  .tab.active {
    background: #000;
    color: #fff;
  }
  .tab.active:hover { background: #000; color: #fff; }
  .tab .tab-count {
    opacity: 0.55;
    margin-left: 4px;
    font-weight: 400;
  }
  .tab.active .tab-count { opacity: 0.75; }

  .feed { padding: 0; }

  .post {
    display: flex;
    gap: 12px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #f0f0f0;
    position: relative;
  }
  .thread-line {
    position: absolute;
    left: 37px;
    top: 60px;
    bottom: 12px;
    width: 2px;
    background: #e5e5e5;
    border-radius: 1px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffb199, #ff6a88);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    z-index: 1;
  }
  .post-body { flex: 1; min-width: 0; }

  .post-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .post-header .handle {
    font-weight: 600;
    font-size: 15px;
    color: #000;
  }
  .post-header .time {
    color: #999;
    font-size: 14px;
    margin-left: 6px;
  }
  .post-header .counter {
    margin-left: auto;
    font-size: 13px;
    color: #666;
    background: #f3f3f3;
    border-radius: 12px;
    padding: 2px 9px;
    font-weight: 500;
    min-width: 36px;
    text-align: center;
  }
  .post-header .more {
    color: #999;
    font-size: 20px;
    padding: 0 4px 0 8px;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .post-header .counter + .more { margin-left: 4px; }
  .post-header .more.only { margin-left: auto; }

  .caption {
    font-size: 15px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 10px;
    color: #000;
  }

  .source-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px 2px 7px;
    background: #f3f3f3;
    border-radius: 12px;
    font-size: 12px;
    color: #555;
    text-decoration: none;
    font-weight: 500;
    transition: background 0.1s;
    white-space: nowrap;
    margin-left: 2px;
  }
  .source-chip:hover { background: #e5e5e5; color: #000; }
  .source-chip svg { width: 11px; height: 11px; stroke-width: 2.2; color: #777; flex-shrink: 0; }
  .source-chip:hover svg { color: #000; }

  /* Threads-native carousel: fixed height, natural aspect widths, next slide peeks */
  .carousel {
    position: relative;
    margin: 0 -20px 10px;
    overflow: hidden;
  }
  .carousel-track {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    scroll-snap-type: x mandatory;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-slide {
    flex: 0 0 auto;
    scroll-snap-align: start;
    height: 380px;
    max-width: calc(100% - 60px);
    border-radius: 14px;
    overflow: hidden;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-slide img,
  .carousel-slide video {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .carousel-single .carousel-slide {
    max-width: 100%;
  }

  /* Placeholder slide — dashed card describing image that goes here */
  .carousel-slide.placeholder {
    background: #fafafa;
    border: 2px dashed #d0d0d0;
    padding: 24px 20px;
    width: 260px;
    flex-direction: column;
    text-align: center;
    color: #666;
  }
  .carousel-slide.placeholder .ph-icon {
    font-size: 34px;
    opacity: 0.55;
    margin-bottom: 14px;
    line-height: 1;
  }
  .carousel-slide.placeholder .ph-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #999;
    margin-bottom: 10px;
  }
  .carousel-slide.placeholder .ph-body {
    font-size: 14px;
    line-height: 1.45;
    color: #333;
    max-width: 220px;
  }

  .actions {
    display: flex;
    gap: 2px;
    margin-top: 6px;
    color: #666;
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    color: #666;
    user-select: none;
    transition: background 0.1s;
  }
  .action:hover { background: #f5f5f5; }
  .action svg { width: 20px; height: 20px; stroke-width: 1.6; }

  .empty {
    padding: 80px 24px;
    text-align: center;
    color: #666;
  }
  .empty .emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  .empty h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #000; }
  .empty p { font-size: 14px; line-height: 1.5; max-width: 340px; margin: 0 auto; }
  .empty code {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>internet moments x micro apps</h1>
      <span class="count" id="count">0 posts</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="feed" id="feed"></div>
  </div>

<script>

    "caption": "This is the LGBTQIA+ show we all WISH WE HAD GROWING UP. 🍂\n\nwhich is why Netflix's new thing that reads your Heartstopper watch history and matches you with the character closest to you kind of hits like a portal\n\nif we couldn't be them at 14, at least we get to know which one we are now",

  },
  {

    "time": "5h",
    "microApp": "Heartstopper Match",
    "caption": "all of us this week: \"Heartstopper Forever will always hold the most special place in my heart\" 🩵💛\n\nNetflix: come here, we made a thing that reads your watch history and tells you which Heartstopper character you are\n\nme:",
    "source": {
      "handle": "@booknerd_charlie",
      "platform": "Threads",
      "url": "https://www.threads.com/@booknerd_charlie/post/Da5grOElhrt?xmt=AQG0bgLb0-9kmey1AfoSU38uLgIQ5zDdcm2pyLZfIS6bgg"
    },
    "images": [
      {

      },

  const feed = document.getElementById('feed');
  const countEl = document.getElementById('count');
  const tabsEl = document.getElementById('tabs');
  let activeFilter = 'all';

  function iconHeart() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'; }
  function iconComment() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'; }
  function iconRepost() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>'; }
  function iconShare() { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>'; }

  function initial(handle) {
    return (handle || '?').replace(/^@/, '').charAt(0).toUpperCase();
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  function renderPost(post, idx) {
    const n = post.images ? post.images.length : 0;
    const isMulti = n > 1;
    const slides = (post.images || []).map((s, i) => {
      // Placeholder slide (text card describing what image goes here)
      if (s && typeof s === 'object' && s.placeholder) {
        return `<div class="carousel-slide placeholder">
          <div class="ph-icon">🖼️</div>
          <div class="ph-label">Slide ${i + 1}</div>
          <div class="ph-body">${escapeHtml(s.placeholder)}</div>
        </div>`;
      }
      const src = typeof s === 'string' ? s : (s && s.src) || '';
      const isVideo = /^data:video\//.test(src) || /\.(mp4|webm|mov)($|\?)/i.test(src);
      const media = isVideo
        ? `<video src="${src}" autoplay loop muted playsinline></video>`
        : `<img src="${src}" alt="" />`;
      return `<div class="carousel-slide">${media}</div>`;
    }).join('');
    const counterHtml = isMulti
      ? `<span class="counter" data-total="${n}"><span class="cur">1</span>/${n}</span><span class="more">···</span>`
      : `<span class="more only">···</span>`;

    return `
      <article class="post" data-idx="${idx}">
        <div class="thread-line"></div>
        <div class="avatar">${initial(post.handle)}</div>
        <div class="post-body">
          <div class="post-header">
            <span class="handle">${escapeHtml(post.handle || 'emily')}</span>
            ${post.source ? `
              <a class="source-chip" href="${escapeHtml(post.source.url)}" target="_blank" rel="noopener noreferrer" title="Open original ${escapeHtml(post.source.platform || 'Threads')} post by ${escapeHtml(post.source.handle || '')}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${escapeHtml(post.source.handle || 'source')}
              </a>` : ''}
            <span class="time">${escapeHtml(post.time || '')}</span>
            ${counterHtml}
          </div>
          <div class="caption">${escapeHtml(post.caption)}</div>
          ${n ? `
            <div class="carousel ${isMulti ? '' : 'carousel-single'}">
              <div class="carousel-track">${slides}</div>
            </div>` : ''}
          <div class="actions">
            <span class="action">${iconHeart()}</span>
            <span class="action">${iconComment()}</span>
            <span class="action">${iconRepost()}</span>
            <span class="action">${iconShare()}</span>
          </div>
        </div>
      </article>
    `;
  }

  function renderEmpty() {
    return `
      <div class="empty">
        <div class="emoji">💡</div>
        <h2>No inspo yet</h2>
        <p>Send me an idea + slide images in chat. I'll draft the caption with your <code>shelf-viral-caption</code> skill and drop it here as a post.</p>
      </div>
    `;
  }

  function renderTabs() {
    const uniqueApps = [];
    const seen = new Set();
    posts.forEach(p => {
      const a = p.microApp || 'Other';
      if (!seen.has(a)) { seen.add(a); uniqueApps.push(a); }
    });
    const buttons = [{ key: 'all', label: 'All', count: posts.length }];
    uniqueApps.forEach(a => {
      buttons.push({ key: a, label: a, count: posts.filter(p => (p.microApp || 'Other') === a).length });
    });
    tabsEl.innerHTML = buttons.map(b =>
      `<button class="tab${activeFilter === b.key ? ' active' : ''}" data-key="${escapeHtml(b.key)}">${escapeHtml(b.label)}<span class="tab-count">${b.count}</span></button>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => {
        activeFilter = el.dataset.key;
        renderTabs();
        render();
      });
    });
  }

  function render() {
    renderTabs();
    const filtered = activeFilter === 'all'
      ? posts
      : posts.filter(p => (p.microApp || 'Other') === activeFilter);
    if (!filtered.length) {
      feed.innerHTML = renderEmpty();
      countEl.textContent = '0 posts';
      return;
    }
    feed.innerHTML = filtered.map(renderPost).join('');
    countEl.textContent = filtered.length === 1 ? '1 post' : filtered.length + ' posts';
    wireCarousels();
  }

  function wireCarousels() {
    document.querySelectorAll('.post').forEach(postEl => {
      const track = postEl.querySelector('.carousel-track');
      const cur = postEl.querySelector('.counter .cur');
      if (!track || !cur) return;
      const slides = track.querySelectorAll('.carousel-slide');
      track.addEventListener('scroll', () => {
        let bestIdx = 0;
        let bestDist = Infinity;
        const scrollLeft = track.scrollLeft;
        slides.forEach((slide, i) => {
          const dist = Math.abs(slide.offsetLeft - scrollLeft - 20);
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        });
        cur.textContent = String(bestIdx + 1);
      });
    });
  }

  render();
</script>
</body>
</html>
