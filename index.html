<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>internet moments x micro apps</title>
<style>
  :root {
    color-scheme: light;
    /* Shelf brand palette */
    --ink: #0F0F0F;
    --paper: #FAF6EE;         /* warm cream page bg */
    --card: #FFFFFF;
    --muted: #8B8B85;         /* warm gray */
    --line: #EFE9DA;          /* warm border */
    --line-soft: #F6F1E4;

    /* Pastels — main tones */
    --pink-soft: #FCE3EF;
    --peri-soft: #DCE1FA;
    --lime-soft: #ECF7C6;
    --peach-soft: #FBE0D2;
    --yellow-soft: #FBF1CC;
    --mint-soft: #A6DEBB;

    /* Vivid — highlights */
    --pink: #F26FBB;
    --peri: #8B99F0;
    --lime: #C2F14E;
    --coral: #EE4A2A;
    --yellow: #F1C22E;
    --green: #22B24C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 16px 0 80px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(15, 15, 15, 0.05);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  .header .count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  /* Shelf wordmark logo in header top-right */
  .header-logo {
    height: 22px;
    width: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Micro-app filter tabs — sticky below header. Each app has a signature pastel + vivid. */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 49px;
    z-index: 9;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 16px;
    background: var(--line-soft);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.15s, color 0.15s, transform 0.05s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab:hover { background: var(--line); }
  .tab:active { transform: scale(0.97); }
  .tab .tab-count {
    opacity: 0.55;
    margin-left: 4px;
    font-weight: 500;
  }
  .tab.active .tab-count { opacity: 0.8; }

  /* Signature colors per micro-app */
  .tab[data-key="Celeb Soulmate"] { background: var(--pink-soft); color: #A63587; }
  .tab[data-key="Celeb Soulmate"]:hover { background: #F9CFE4; }
  .tab[data-key="Celeb Soulmate"].active { background: var(--pink); color: #fff; }
  .tab[data-key="Celeb Soulmate"].active:hover { background: #EE5EB0; }

  .tab[data-key="Heartstopper Match"] { background: var(--peri-soft); color: #4557C4; }
  .tab[data-key="Heartstopper Match"]:hover { background: #CBD3F7; }
  .tab[data-key="Heartstopper Match"].active { background: var(--peri); color: #fff; }
  .tab[data-key="Heartstopper Match"].active:hover { background: #7987EC; }

  .tab[data-key="iPod Top Song"] { background: var(--lime-soft); color: #5D7A0E; }
  .tab[data-key="iPod Top Song"]:hover { background: #E1F3B0; }
  .tab[data-key="iPod Top Song"].active { background: var(--lime); color: var(--ink); }
  .tab[data-key="iPod Top Song"].active:hover { background: #B4EA35; }

  .tab[data-key="What's In My Bag"] { background: var(--yellow-soft); color: #7A5A0F; }
  .tab[data-key="What's In My Bag"]:hover { background: #F7E8A5; }
  .tab[data-key="What's In My Bag"].active { background: var(--yellow); color: var(--ink); }
  .tab[data-key="What's In My Bag"].active:hover { background: #E5B21A; }

  .tab[data-key="all"].active { background: var(--ink); color: #fff; }
  .tab[data-key="all"].active:hover { background: #000; }

  .feed { padding: 0; }

  /* Trend grid — shown when All tab is active and no trend drilled in.
     Always 2 columns so the grid look is preserved on mobile too. */
  .trend-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 12px;
  }
  @media (min-width: 560px) {
    .trend-list { gap: 12px; }
  }
  .trend-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.06s;
    min-height: 110px;
  }
  @media (min-width: 560px) {
    .trend-card { padding: 16px; border-radius: 16px; min-height: 120px; }
  }
  .trend-card:hover {
    background: #FEF9F3;
    border-color: var(--line);
    transform: translateY(-1px);
  }
  .trend-card:active { transform: translateY(0); }
  .trend-card.hot {
    border-color: #F9CFB3;
    background: linear-gradient(180deg, #FFF7F0 0%, var(--card) 100%);
  }
  .trend-card.hot:hover {
    border-color: var(--coral);
    background: linear-gradient(180deg, #FFEBD9 0%, #FEF9F3 100%);
  }
  .trend-flame {
    display: inline-block;
    animation: flame-flicker 2s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes flame-flicker {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    50% { transform: rotate(3deg) scale(1.1); }
  }
  .trend-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .trend-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.15px;
    line-height: 1.25;
  }
  .trend-meta {
    font-size: 12px;
    color: var(--muted);
  }
  .trend-signals {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .trend-signal {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .trend-signal svg { width: 14px; height: 14px; stroke-width: 1.8; }
  .trend-signal.heat {
    color: var(--coral);
    font-weight: 700;
    margin-left: auto;
  }
  .trend-signal.heat svg { width: 15px; height: 15px; }
  .trend-apps {
    display: flex;
    gap: 4px;
    margin-top: auto;
    padding-top: 8px;
    flex-wrap: wrap;
  }
  .trend-app-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .trend-app-chip[data-app="Celeb Soulmate"] { background: var(--pink-soft); color: #A63587; }
  .trend-app-chip[data-app="Heartstopper Match"] { background: var(--peri-soft); color: #4557C4; }
  .trend-app-chip[data-app="iPod Top Song"] { background: var(--lime-soft); color: #5D7A0E; }
  .trend-app-chip[data-app="What's In My Bag"] { background: var(--yellow-soft); color: #7A5A0F; }
  .trend-app-chip[data-app="Other"] { background: var(--line-soft); color: var(--muted); }

  .trend-chevron { display: none; }

  /* Back to trends button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
    border-bottom: 1px solid var(--line-soft);
    transition: color 0.15s, background 0.15s;
  }
  .back-btn:hover { background: #FEF9F3; color: var(--ink); }
  .back-btn svg { width: 16px; height: 16px; stroke-width: 2; }
  .back-btn .trend-context { color: var(--ink); font-weight: 700; margin-left: 6px; }

  .post {
    display: flex;
    gap: 12px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--line-soft);
    position: relative;
  }
  .thread-line {
    position: absolute;
    left: 37px;
    top: 60px;
    bottom: 12px;
    width: 2px;
    background: var(--line);
    border-radius: 1px;
  }

    background-position: center;

    box-shadow: 0 1px 3px rgba(242, 111, 187, 0.25);
    text-indent: -9999px;
    overflow: hidden;
  }
  .post-body { flex: 1; min-width: 0; }

  .post-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .post-header .handle {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .post-header .time {
    color: var(--muted);
    font-size: 14px;
    margin-left: 6px;
  }
  .post-header .counter {
    margin-left: auto;
    font-size: 12px;
    color: #4557C4;
    background: var(--peri-soft);
    border-radius: 12px;
    padding: 3px 10px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
  }
  .post-header .more {
    color: #C4BEB0;
    font-size: 20px;
    padding: 0 4px 0 8px;
    cursor: pointer;
    user-select: none;
    line-height: 1;
  }
  .post-header .counter + .more { margin-left: 4px; }
  .post-header .more.only { margin-left: auto; }

  .caption {
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .source-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px 3px 8px;
    background: var(--peach-soft);
    border-radius: 12px;
    font-size: 12px;
    color: #B84A1F;
    text-decoration: none;
    font-weight: 700;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    margin-left: 2px;
  }
  .source-chip:hover { background: #F9CFB3; color: #8F3812; }
  .source-chip svg { width: 11px; height: 11px; stroke-width: 2.4; color: #B84A1F; flex-shrink: 0; }
  .source-chip:hover svg { color: #8F3812; }

  /* Threads-native carousel: fixed height, natural aspect widths, next slide peeks */
  .carousel {
    position: relative;
    margin: 0 -20px 10px;
    overflow: hidden;
  }
  .carousel-track {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    scroll-snap-type: x mandatory;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-slide {
    flex: 0 0 auto;
    scroll-snap-align: start;
    height: 380px;
    max-width: calc(100% - 60px);
    border-radius: 14px;
    overflow: hidden;
    background: var(--line-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-slide img,
  .carousel-slide video {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .carousel-single .carousel-slide {
    max-width: 100%;
  }

  /* Placeholder slide — dashed card describing image that goes here */
  .carousel-slide.placeholder {
    background: #FEF9F3;
    border: 2px dashed var(--pink);
    padding: 24px 20px;
    width: 260px;
    flex-direction: column;
    text-align: center;
    color: var(--muted);
  }
  .carousel-slide.placeholder .ph-icon {
    font-size: 34px;
    opacity: 0.75;
    margin-bottom: 14px;
    line-height: 1;
  }
  .carousel-slide.placeholder .ph-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--pink);
    margin-bottom: 10px;
  }
  .carousel-slide.placeholder .ph-body {
    font-size: 14px;
    line-height: 1.45;
    color: var(--ink);
    max-width: 220px;
  }

  .actions {
    display: flex;
    gap: 2px;
    margin-top: 6px;
    color: var(--muted);
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .action:hover { background: var(--pink-soft); color: var(--pink); }
  .action:hover:nth-child(2) { background: var(--peri-soft); color: var(--peri); }
  .action:hover:nth-child(3) { background: var(--lime-soft); color: #5D7A0E; }
  .action:hover:nth-child(4) { background: var(--peach-soft); color: var(--coral); }
  .action svg { width: 20px; height: 20px; stroke-width: 1.6; }
  .action-count {
    font-size: 13px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .empty {
    padding: 80px 24px;
    text-align: center;
    color: var(--muted);
  }
  .empty .emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.85; }
  .empty h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
  .empty p { font-size: 14px; line-height: 1.5; max-width: 340px; margin: 0 auto; }
  .empty code {
    background: var(--pink-soft);
    color: var(--pink);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>
<body>
  <div class="app">

  function initial(handle) {
    return (handle || '?').replace(/^@/, '').charAt(0).toUpperCase();
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  function formatCount(n) {
    if (!n && n !== 0) return '—';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
    return String(n);
  }

  function aggregateTrend(trendPosts) {
    return trendPosts.reduce((acc, p) => {
      const m = (p.source && p.source.metrics) || {};
      acc.likes += m.likes || 0;
      acc.comments += m.comments || 0;
      acc.reposts += m.reposts || 0;
      return acc;
    }, { likes: 0, comments: 0, reposts: 0 });
  }

    if (likes >= 20000) return '🔥🔥🔥';
    if (likes >= 5000) return '🔥🔥';
    if (likes >= 1000) return '🔥';
    return '';

        ? `<video src="${src}" autoplay loop muted playsinline></video>`

      return `<div class="carousel-slide">${media}</div>`;
    }).join('');

        <div class="emoji">💡</div>
        <h2>No inspo yet</h2>
        <p>Send me an idea + slide images in chat. I'll draft the caption with your <code>shelf-viral-caption</code> skill and drop it here as a post.</p>
      </div>
    `;
  }

  function renderTabs() {
    const uniqueApps = [];
    const seen = new Set();
    posts.forEach(p => {
      const a = p.microApp || 'Other';
      if (!seen.has(a)) { seen.add(a); uniqueApps.push(a); }
    });
    const buttons = [{ key: 'all', label: 'All', count: posts.length }];
    uniqueApps.forEach(a => {
      buttons.push({ key: a, label: a, count: posts.filter(p => (p.microApp || 'Other') === a).length });
    });
    tabsEl.innerHTML = buttons.map(b =>
      `<button class="tab${activeFilter === b.key ? ' active' : ''}" data-key="${escapeHtml(b.key)}">${escapeHtml(b.label)}<span class="tab-count">${b.count}</span></button>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => {
        activeFilter = el.dataset.key;
        activeTrend = null;  // switching tabs clears any drilled-in trend
        renderTabs();
        render();
      });
    });
  }

  function renderTrendList() {
    // Group posts by trend, preserve first-seen order (matches how posts array is ordered — newest first)
    const trendMap = new Map();
    posts.forEach(p => {
      const t = p.trend || 'Uncategorized';
      if (!trendMap.has(t)) {
        trendMap.set(t, { name: t, posts: [], apps: new Set() });
      }
      const entry = trendMap.get(t);
      entry.posts.push(p);
      if (p.microApp) entry.apps.add(p.microApp);
    });

    const trends = Array.from(trendMap.values());
    // Highlighted trends bubble to the top of the grid
    trends.sort((a, b) => (highlightedTrends.has(b.name) ? 1 : 0) - (highlightedTrends.has(a.name) ? 1 : 0));

    const cards = trends.map(t => {
      const hot = highlightedTrends.has(t.name);
      return `
      <div class="trend-card${hot ? ' hot' : ''}" data-trend="${escapeHtml(t.name)}">
        <div class="trend-body">
          <div class="trend-title">${hot ? '<span class="trend-flame">🔥</span> ' : ''}${escapeHtml(t.name)}</div>
          <div class="trend-meta">${t.posts.length} ${t.posts.length === 1 ? 'post' : 'posts'}</div>
          <div class="trend-apps">
            ${Array.from(t.apps).map(a => `<span class="trend-app-chip" data-app="${escapeHtml(a)}">${escapeHtml(a)}</span>`).join('')}
          </div>
        </div>
      </div>
    `;
    }).join('');
    return `<div class="trend-list">${cards}</div>`;
  }

  function renderBackBtn() {
    return `
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All trends<span class="trend-context">/ ${escapeHtml(activeTrend)}</span>
      </button>
    `;
  }

  function wireTrendCards() {
    document.querySelectorAll('.trend-card').forEach(el => {
      el.addEventListener('click', () => {
        activeTrend = el.dataset.trend;
        render();
      });
    });
    const back = document.getElementById('back-btn');
    if (back) {
      back.addEventListener('click', () => {
        activeTrend = null;
        render();
      });
    }
  }

  function render() {
    renderTabs();

    // All tab, no trend drilled → show trend cards
    if (activeFilter === 'all' && !activeTrend) {
      if (!posts.length) {
        feed.innerHTML = renderEmpty();
        if (countEl) countEl.textContent = '0 posts';
        return;
      }
      const trendCount = new Set(posts.map(p => p.trend || 'Uncategorized')).size;
      feed.innerHTML = renderTrendList();
      if (countEl) countEl.textContent = trendCount === 1 ? '1 trend' : trendCount + ' trends';
      wireTrendCards();
      return;
    }

    // Otherwise show filtered posts (by micro-app OR by drilled trend)
    let filtered;
    if (activeFilter === 'all' && activeTrend) {
      filtered = posts.filter(p => (p.trend || 'Uncategorized') === activeTrend);
    } else {
      filtered = posts.filter(p => (p.microApp || 'Other') === activeFilter);
    }

    if (!filtered.length) {
      feed.innerHTML = renderEmpty();
      if (countEl) countEl.textContent = '0 posts';
      return;
    }

    const backHtml = activeTrend ? renderBackBtn() : '';
    feed.innerHTML = backHtml + filtered.map(renderPost).join('');
    if (countEl) countEl.textContent = filtered.length === 1 ? '1 post' : filtered.length + ' posts';
    wireCarousels();
    wireTrendCards();  // wires the back button
  }

  function wireCarousels() {
    document.querySelectorAll('.post').forEach(postEl => {
      const track = postEl.querySelector('.carousel-track');
      const cur = postEl.querySelector('.counter .cur');
      if (!track || !cur) return;
      const slides = track.querySelectorAll('.carousel-slide');
      track.addEventListener('scroll', () => {
        let bestIdx = 0;
        let bestDist = Infinity;
        const scrollLeft = track.scrollLeft;
        slides.forEach((slide, i) => {
          const dist = Math.abs(slide.offsetLeft - scrollLeft - 20);
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        });
        cur.textContent = String(bestIdx + 1);
      });
    });
  }

  render();
</script>
</body>
</html>
